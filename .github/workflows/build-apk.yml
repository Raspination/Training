name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3
        with:
          packages: platform-tools platforms;android-34 build-tools;34.0.0

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Pre-configure Bubblewrap (skip JDK/SDK install prompts)
        run: |
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json <<EOF
          {
            "jdkPath": "$JAVA_HOME",
            "androidSdkPath": "$ANDROID_HOME"
          }
          EOF
          echo "Bubblewrap config:"
          cat ~/.bubblewrap/config.json

      - name: Generate signing keystore
        run: |
          if [ ! -f "android.keystore" ]; then
            keytool -genkeypair -v \
              -keystore android.keystore -alias android \
              -keyalg RSA -keysize 2048 -validity 36500 \
              -storepass romanplan -keypass romanplan \
              -dname "CN=Roman, O=Roman, L=Tel Aviv, C=IL"
          fi

      - name: Build APK
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: romanplan
          BUBBLEWRAP_KEY_PASSWORD: romanplan
        run: |
          export GRADLE_OPTS="-Xmx2g -Dorg.gradle.daemon=false"
          bubblewrap build --skipPwaValidation

      - name: List built files
        if: always()
        run: find . -name "*.apk" -o -name "*.aab"

      - uses: actions/upload-artifact@v4
        with:
          name: roman-plan-apk
          path: |
            app-release-signed.apk
            app-release-bundle.aab
          retention-days: 90
          if-no-files-found: warn

      - uses: actions/upload-artifact@v4
        with:
          name: signing-keystore
          path: android.keystore
          retention
