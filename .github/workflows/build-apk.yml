name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Install required SDK packages
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager --install "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          echo "--- SDK contents ---"
          ls -la $ANDROID_HOME

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Pre-configure Bubblewrap
        run: |
          mkdir -p $HOME/.bubblewrap
          printf '{"jdkPath":"%s","androidSdkPath":"%s"}' "$JAVA_HOME" "$ANDROID_HOME" > $HOME/.bubblewrap/config.json
          cat $HOME/.bubblewrap/config.json

      - name: Generate keystore
        run: keytool -genkeypair -v -keystore android.keystore -alias android -keyalg RSA -keysize 2048 -validity 36500 -storepass romanplan -keypass romanplan -dname "CN=Roman, O=Roman, L=Tel Aviv, C=IL"

      - name: Build APK
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: romanplan
          BUBBLEWRAP_KEY_PASSWORD: romanplan
        run: |
          yes '' | bubblewrap build --skipPwaValidation

      - name: List artifacts
        if: always()
        run: find . -name "*.apk" -o -name "*.aab"

      - uses: actions/upload-artifact@v4
        with:
          name: roman-plan-apk
          path: app-release-signed.apk
          if-no-files-found: warn

      - uses: actions/upload-artifact@v4
        with:
          name: signing-keystore
          path: android.keystore
          if-no-files-found: warn
